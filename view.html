<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Product Details</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                        <h3 class="mb-0">Product Details</h3>
                        <span class="badge bg-light text-dark">ID: <span th:text="${product.id}"></span></span>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-4 fw-bold">Product Name:</div>
                            <div class="col-md-8" th:text="${product.name}"></div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4 fw-bold">Category:</div>
                            <div class="col-md-8" th:text="${product.category != null ? product.category : 'Uncategorized'}"></div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4 fw-bold">Description:</div>
                            <div class="col-md-8" th:text="${product.description}"></div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4 fw-bold">Price:</div>
                            <div class="col-md-8 text-success fw-bold fs-4">$<span th:text="${product.price}"></span></div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4 fw-bold">Quantity in Stock:</div>
                            <div class="col-md-8">
                                <span th:if="${product.quantity > 0}" class="text-success">
                                    <i class="bi bi-check-circle"></i> <span th:text="${product.quantity}"></span> in stock
                                </span>
                                <span th:if="${product.quantity == 0}" class="text-danger">
                                    <i class="bi bi-x-circle"></i> Out of stock
                                </span>
                            </div>
                        </div>
                        <div class="row mb-3" th:if="${product.imageUrl}">
                            <div class="col-md-4 fw-bold">Product Image:</div>
                            <div class="col-md-8">
                                <img th:src="${product.imageUrl}" style="max-width: 200px;" class="img-fluid" />
                            </div>
                        </div>
                        <hr>
                        <div class="d-flex gap-2">
                            <a th:href="@{/products}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Back to List
                            </a>
                            <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning">
                                <i class="bi bi-pencil"></i> Edit Product
                            </a>
                            <a th:href="@{/products/delete/{id}(id=${product.id})}" 
                               class="btn btn-danger"
                               onclick="return confirm('Delete this product?')">
                                <i class="bi bi-trash"></i> Delete Product
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
