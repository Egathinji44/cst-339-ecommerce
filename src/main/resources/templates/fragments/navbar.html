<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!--/* Reusable Navigation Bar Fragment */-->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <!-- Brand -->
        <a class="navbar-brand fw-bold" th:href="@{/}">
            🛒 NexusStore
        </a>

        <!-- Mobile toggle -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <!-- Left links -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">Products</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#"
                       data-bs-toggle="dropdown">Categories</a>
                    <ul class="dropdown-menu dropdown-menu-dark">
                        <li><a class="dropdown-item" th:href="@{/products(category='Electronics')}">Electronics</a></li>
                        <li><a class="dropdown-item" th:href="@{/products(category='Apparel')}">Apparel</a></li>
                        <li><a class="dropdown-item" th:href="@{/products(category='Accessories')}">Accessories</a></li>
                    </ul>
                </li>
            </ul>

            <!-- Right links: show Login/Register when anonymous, username + Logout when authenticated -->
            <ul class="navbar-nav ms-auto">
                <th:block sec:authorize="isAnonymous()">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/login}">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-outline-light btn-sm ms-2" th:href="@{/register}">Register</a>
                    </li>
                </th:block>
                <th:block sec:authorize="isAuthenticated()">
                    <li class="nav-item">
                        <span class="nav-link text-light">
                            👤 <span sec:authentication="principal.firstName">User</span>
                        </span>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/products/new}">+ Add Product</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-outline-danger btn-sm ms-2" th:href="@{/logout}">Logout</a>
                    </li>
                </th:block>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
