<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NexusStore - My Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .cart-img { width: 70px; height: 70px; object-fit: cover; }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h2 class="mb-4">Your Shopping Cart</h2>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Empty cart state -->
    <div th:if="${#lists.isEmpty(cart.items)}" class="text-center py-5">
        <p class="text-muted fs-5">Your cart is empty.</p>
        <a th:href="@{/products}" class="btn btn-dark">Browse Products</a>
    </div>

    <!-- Cart contents -->
    <div th:unless="${#lists.isEmpty(cart.items)}" class="row g-4">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th colspan="2">Product</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Line Total</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${cart.items}">
                            <td style="width: 80px;">
                                <img th:src="${item.imageUrl}" th:alt="${item.productName}"
                                     class="cart-img rounded"
                                     onerror="this.onerror=null;this.src='https://placehold.co/70x70/cccccc/666666?text=No+Image'">
                            </td>
                            <td th:text="${item.productName}">Product Name</td>
                            <td th:text="'$' + ${#numbers.formatDecimal(item.price, 1, 2)}">$0.00</td>
                            <td style="width: 160px;">
                                <form th:action="@{/cart/update}" method="post" class="d-flex gap-2">
                                    <input type="hidden" name="productId" th:value="${item.productId}">
                                    <input type="number" name="quantity" th:value="${item.quantity}"
                                           min="1" class="form-control form-control-sm" style="width: 70px;">
                                    <button type="submit" class="btn btn-outline-dark btn-sm">Update</button>
                                </form>
                            </td>
                            <td class="fw-bold" th:text="'$' + ${#numbers.formatDecimal(item.lineTotal, 1, 2)}">$0.00</td>
                            <td>
                                <form th:action="@{/cart/remove/{productId}(productId=${item.productId})}" method="post">
                                    <button type="submit" class="btn btn-outline-danger btn-sm">Remove</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <form th:action="@{/cart/clear}" method="post" class="mt-3">
                <button type="submit" class="btn btn-outline-secondary btn-sm">Clear Cart</button>
            </form>
        </div>

        <!-- Order summary -->
        <div class="col-lg-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="card-title">Order Summary</h5>
                    <ul class="list-group list-group-flush mb-3">
                        <li class="list-group-item d-flex justify-content-between">
                            <span>Items</span>
                            <span th:text="${cart.itemCount}">0</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between fw-bold">
                            <span>Subtotal</span>
                            <span th:text="'$' + ${#numbers.formatDecimal(cart.subtotal, 1, 2)}">$0.00</span>
                        </li>
                    </ul>
                    <a th:href="@{/checkout}" class="btn btn-dark w-100">Proceed to Checkout &rarr;</a>
                    <a th:href="@{/products}" class="btn btn-outline-secondary w-100 mt-2">Continue Shopping</a>
                </div>
            </div>
        </div>
    </div>

</div>

<footer class="bg-dark text-light text-center py-3 mt-5">
    <p class="mb-0">&copy; 2026 NexusStore. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
