<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="'NexusStore - ' + ${product.name}">NexusStore - Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
            <li class="breadcrumb-item"><a th:href="@{/products}">Products</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/products(category=${product.category})}" th:text="${product.category}">Category</a>
            </li>
            <li class="breadcrumb-item active" th:text="${product.name}">Product</li>
        </ol>
    </nav>

    <div class="card shadow-sm border-0">
        <div class="row g-0">
            <!-- Product Image -->
            <div class="col-md-5">
                <img th:src="${product.imageUrl}" th:alt="${product.name}"
                     class="img-fluid rounded-start"
                     style="width:100%; height:400px; object-fit:cover;"
                     onerror="this.onerror=null;this.src='https://placehold.co/500x400/cccccc/666666?text=No+Image'">
            </div>

            <!-- Product Details -->
            <div class="col-md-7">
                <div class="card-body p-4">
                    <span class="badge bg-secondary mb-2" th:text="${product.category}">Category</span>
                    <h2 class="card-title" th:text="${product.name}">Product Name</h2>

                    <p class="fs-2 fw-bold text-success mb-3"
                       th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</p>

                    <p class="card-text text-muted" th:text="${product.description}">Description</p>

                    <hr>

                    <div class="row mb-3">
                        <div class="col-6">
                            <strong>Stock Available:</strong>
                            <span th:if="${product.stockQuantity > 0}"
                                  class="text-success ms-1" th:text="${product.stockQuantity} + ' units'">In stock</span>
                            <span th:unless="${product.stockQuantity > 0}"
                                  class="text-danger ms-1">Out of Stock</span>
                        </div>
                        <div class="col-6">
                            <strong>Date Added:</strong>
                            <span class="ms-1" th:text="${product.dateAdded}">Date</span>
                        </div>
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                        <a th:href="@{/products}" class="btn btn-outline-secondary">
                            &larr; Back to Products
                        </a>
                        <!-- Admin actions — shown only to ADMIN role via Spring Security -->
                        <th:block sec:authorize="hasRole('ADMIN')">
                            <a th:href="@{/products/{id}/edit(id=${product.productId})}"
                               class="btn btn-warning">Edit Product</a>
                            <form th:action="@{/products/{id}/delete(id=${product.productId})}"
                                  method="post" style="display:inline;"
                                  onsubmit="return confirm('Are you sure you want to delete this product?');">
                                <button type="submit" class="btn btn-danger">Delete Product</button>
                            </form>
                        </th:block>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<footer class="bg-dark text-light text-center py-3 mt-5">
    <p class="mb-0">&copy; 2026 NexusStore. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
