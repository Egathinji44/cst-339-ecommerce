<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NexusStore - Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }
        .product-card { transition: transform 0.2s ease; }
        .product-img { height: 180px; object-fit: cover; }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <!-- Page header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-0">
                <span th:if="${selectedCategory}" th:text="${selectedCategory}">Category</span>
                <span th:unless="${selectedCategory}">All Products</span>
            </h2>
            <small class="text-muted" th:text="${products.size()} + ' products found'"></small>
        </div>
        <!-- Admin-only: Add Product button -->
        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/products/new}" class="btn btn-success">
            + Add Product
        </a>
    </div>

    <!-- Category filter buttons -->
    <div class="mb-4">
        <a th:href="@{/products}" class="btn btn-sm me-2"
           th:classappend="${selectedCategory == null} ? 'btn-dark' : 'btn-outline-dark'">All</a>
        <a th:each="cat : ${categories}"
           th:href="@{/products(category=${cat})}"
           th:text="${cat}"
           class="btn btn-sm me-2"
           th:classappend="${selectedCategory == cat} ? 'btn-dark' : 'btn-outline-dark'">Category</a>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Product Grid -->
    <div class="row g-4" th:if="${not #lists.isEmpty(products)}">
        <div class="col-sm-6 col-md-4 col-lg-3" th:each="product : ${products}">
            <div class="card product-card h-100 border-0 shadow-sm">
                <img th:src="${product.imageUrl}" th:alt="${product.name}"
                     class="card-img-top product-img"
                     onerror="this.onerror=null;this.src='https://placehold.co/300x180/cccccc/666666?text=No+Image'">
                <div class="card-body d-flex flex-column">
                    <span class="badge bg-secondary mb-2 align-self-start" th:text="${product.category}"></span>
                    <h6 class="card-title" th:text="${product.name}">Product Name</h6>
                    <p class="card-text text-muted small flex-grow-1"
                       th:text="${#strings.abbreviate(product.description, 80)}">Description</p>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <span class="fw-bold text-success fs-5"
                              th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</span>
                        <small class="text-muted" th:text="'In stock: ' + ${product.stockQuantity}"></small>
                    </div>
                    <div class="mt-3 d-flex gap-2">
                        <a th:href="@{/products/{id}(id=${product.productId})}"
                           class="btn btn-dark btn-sm flex-grow-1">View Details</a>
                        <!-- Admin edit button -->
                        <a sec:authorize="hasRole('ADMIN')"
                           th:href="@{/products/{id}/edit(id=${product.productId})}"
                           class="btn btn-outline-secondary btn-sm">Edit</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div th:unless="${not #lists.isEmpty(products)}" class="text-center py-5">
        <p class="text-muted fs-5">No products found in this category.</p>
        <a th:href="@{/products}" class="btn btn-dark">View All Products</a>
    </div>

</div>

<footer class="bg-dark text-light text-center py-3 mt-5">
    <p class="mb-0">&copy; 2026 NexusStore. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
