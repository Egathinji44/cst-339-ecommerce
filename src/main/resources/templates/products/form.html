<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="'NexusStore - ' + ${formTitle}">NexusStore - Product Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="card-title mb-4" th:text="${formTitle}">Product Form</h3>

                    <form th:action="${formAction}" th:object="${product}" method="post">
                        <!-- Hidden productId for edit -->
                        <input type="hidden" th:field="*{productId}">

                        <div class="mb-3">
                            <label for="name" class="form-label">Product Name <span class="text-danger">*</span></label>
                            <input type="text" id="name" th:field="*{name}"
                                   class="form-control" placeholder="e.g. Samsung Galaxy S24"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description <span class="text-danger">*</span></label>
                            <textarea id="description" th:field="*{description}"
                                      class="form-control" rows="3"
                                      placeholder="Describe the product..."
                                      th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
                            <div class="invalid-feedback" th:errors="*{description}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="price" class="form-label">Price ($) <span class="text-danger">*</span></label>
                                <input type="number" id="price" th:field="*{price}"
                                       class="form-control" step="0.01" min="0.01"
                                       placeholder="0.00"
                                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{price}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="stockQuantity" class="form-label">Stock Quantity <span class="text-danger">*</span></label>
                                <input type="number" id="stockQuantity" th:field="*{stockQuantity}"
                                       class="form-control" min="0"
                                       placeholder="0"
                                       th:classappend="${#fields.hasErrors('stockQuantity')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{stockQuantity}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="category" class="form-label">Category <span class="text-danger">*</span></label>
                            <select id="category" th:field="*{category}"
                                    class="form-select"
                                    th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'">
                                <option value="">-- Select a category --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat}"
                                        th:text="${cat}">Category</option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{category}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="imageUrl" class="form-label">Image URL</label>
                            <input type="text" id="imageUrl" th:field="*{imageUrl}"
                                   class="form-control" placeholder="https://example.com/image.jpg">
                            <small class="text-muted">Optional. Leave blank for default image.</small>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-dark">
                                <span th:text="${formTitle}">Save</span>
                            </button>
                            <a th:href="@{/products}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-light text-center py-3 mt-5">
    <p class="mb-0">&copy; 2026 NexusStore. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
