<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NexusStore - My Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h2 class="mb-4">My Orders</h2>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
        <p class="text-muted fs-5">You haven't placed any orders yet.</p>
        <a th:href="@{/products}" class="btn btn-dark">Start Shopping</a>
    </div>

    <!-- Orders table -->
    <div th:unless="${#lists.isEmpty(orders)}" class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Order #</th>
                    <th>Date</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}">
                    <td><code th:text="${#strings.substring(order.id, 0, 8)}">abc123</code></td>
                    <td th:text="${#temporals.format(order.orderDate, 'MMM d, yyyy h:mm a')}">Date</td>
                    <td th:text="${order.itemCount}">0</td>
                    <td class="fw-bold" th:text="'$' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}">$0.00</td>
                    <td>
                        <span class="badge bg-secondary" th:text="${order.status}">PENDING</span>
                    </td>
                    <td>
                        <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-outline-dark btn-sm">View Details</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<footer class="bg-dark text-light text-center py-3 mt-5">
    <p class="mb-0">&copy; 2026 NexusStore. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
