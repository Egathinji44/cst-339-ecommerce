<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NexusStore - Manage Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h2 class="mb-4">Manage Orders</h2>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
        <p class="text-muted fs-5">No orders have been placed yet.</p>
    </div>

    <!-- Orders table -->
    <div th:unless="${#lists.isEmpty(orders)}" class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Order #</th>
                    <th>Customer</th>
                    <th>Date</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Update Status</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}">
                    <td><code th:text="${#strings.substring(order.id, 0, 8)}">abc123</code></td>
                    <td th:text="${order.username}">customer</td>
                    <td th:text="${#temporals.format(order.orderDate, 'MMM d, yyyy h:mm a')}">Date</td>
                    <td th:text="${order.itemCount}">0</td>
                    <td class="fw-bold" th:text="'$' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}">$0.00</td>
                    <td>
                        <span class="badge bg-secondary" th:text="${order.status}">PENDING</span>
                    </td>
                    <td>
                        <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post" class="d-flex gap-2">
                            <select name="status" class="form-select form-select-sm" style="width: auto;">
                                <option th:each="s : ${statuses}"
                                        th:value="${s}"
                                        th:text="${s}"
                                        th:selected="${s == order.status}">STATUS</option>
                            </select>
                            <button type="submit" class="btn btn-outline-dark btn-sm">Update</button>
                        </form>
                    </td>
                    <td>
                        <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-outline-secondary btn-sm">View</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<footer class="bg-dark text-light text-center py-3 mt-5">
    <p class="mb-0">&copy; 2026 NexusStore. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
