<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NexusStore - Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h2 class="mb-4">Checkout</h2>

    <div class="row g-4">
        <!-- Shipping address form -->
        <div class="col-lg-7">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h5 class="card-title mb-4">Shipping Address</h5>

                    <form th:action="@{/checkout}" th:object="${shippingAddress}" method="post">

                        <div class="mb-3">
                            <label for="fullName" class="form-label">Full Name <span class="text-danger">*</span></label>
                            <input type="text" id="fullName" th:field="*{fullName}"
                                   class="form-control" placeholder="Jane Doe"
                                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{fullName}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="street" class="form-label">Street Address <span class="text-danger">*</span></label>
                            <input type="text" id="street" th:field="*{street}"
                                   class="form-control" placeholder="123 Main St"
                                   th:classappend="${#fields.hasErrors('street')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{street}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-5 mb-3">
                                <label for="city" class="form-label">City <span class="text-danger">*</span></label>
                                <input type="text" id="city" th:field="*{city}"
                                       class="form-control" placeholder="Phoenix"
                                       th:classappend="${#fields.hasErrors('city')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{city}"></div>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="state" class="form-label">State <span class="text-danger">*</span></label>
                                <input type="text" id="state" th:field="*{state}"
                                       class="form-control" placeholder="AZ" maxlength="2"
                                       th:classappend="${#fields.hasErrors('state')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{state}"></div>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="zipCode" class="form-label">ZIP Code <span class="text-danger">*</span></label>
                                <input type="text" id="zipCode" th:field="*{zipCode}"
                                       class="form-control" placeholder="85001" maxlength="5"
                                       th:classappend="${#fields.hasErrors('zipCode')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{zipCode}"></div>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-3">
                            <button type="submit" class="btn btn-dark">Place Order</button>
                            <a th:href="@{/cart}" class="btn btn-outline-secondary">Back to Cart</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Order summary -->
        <div class="col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="card-title">Order Summary</h5>
                    <ul class="list-group list-group-flush mb-3">
                        <li class="list-group-item d-flex justify-content-between" th:each="item : ${cart.items}">
                            <span th:text="${item.productName} + ' &times; ' + ${item.quantity}">Product &times; 1</span>
                            <span th:text="'$' + ${#numbers.formatDecimal(item.lineTotal, 1, 2)}">$0.00</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between">
                            <span>Subtotal</span>
                            <span th:text="'$' + ${#numbers.formatDecimal(cart.subtotal, 1, 2)}">$0.00</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between">
                            <span>Shipping</span>
                            <span th:text="'$5.99'">$5.99</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between fw-bold fs-5">
                            <span>Total</span>
                            <span th:text="'$' + ${#numbers.formatDecimal(cart.subtotal + 5.99, 1, 2)}">$0.00</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

</div>

<footer class="bg-dark text-light text-center py-3 mt-5">
    <p class="mb-0">&copy; 2026 NexusStore. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
