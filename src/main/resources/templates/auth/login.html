<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NexusStore - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="card-title text-center mb-4">Sign In</h3>

                    <!-- Post-registration success message -->
                    <div th:if="${param.registered}" class="alert alert-success">
                        Account created successfully! Please log in.
                    </div>

                    <!-- Logout confirmation message -->
                    <div th:if="${param.logout}" class="alert alert-info">
                        You have been logged out successfully.
                    </div>

                    <!-- Spring Security sets ?error=true on bad credentials -->
                    <div th:if="${param.error}" class="alert alert-danger">
                        Invalid username or password. Please try again.
                    </div>

                    <!-- Spring Security handles POST /login; Thymeleaf injects CSRF automatically -->
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" id="username" name="username"
                                   class="form-control" placeholder="Enter your username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" name="password"
                                   class="form-control" placeholder="Enter your password" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-dark">Login</button>
                        </div>
                    </form>

                    <hr>
                    <p class="text-center mb-0">
                        Don't have an account?
                        <a th:href="@{/register}">Register here</a>
                    </p>
                </div>
            </div>
            <!-- Test credentials hint -->
            <div class="card mt-3 border-info">
                <div class="card-body text-muted small">
                    <strong>Test Admin:</strong> username: <code>admin</code> / password: <code>admin123</code>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
