# ── Application ──────────────────────────────────────────────────────────────
spring.application.name=nexusstore

# ── MySQL DataSource (Milestone 4) ───────────────────────────────────────────
# Update username/password to match your local MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/nexusstore_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Spring Data JDBC ─────────────────────────────────────────────────────────
# Run schema.sql and data.sql on every startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# ── Logging (optional but helpful during dev) ─────────────────────────────────
logging.level.org.springframework.jdbc=DEBUG
