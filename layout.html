<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusStore</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <style>
        .navbar-brand { font-weight: bold; font-size: 1.5rem; }
        footer { background-color: #343a40; color: white; padding: 20px 0; margin-top: 50px; }
        .alert-flash { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">NexusStore</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
           <ul class="navbar-nav ms-auto">
    <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
    <li th:if="${loggedInUser != null}" class="nav-item"><a class="nav-link" th:href="@{/products}">Products</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/about}">About</a></li>
    <li th:if="${loggedInUser == null}" class="nav-item"><a class="nav-link" th:href="@{/register}">Register</a></li>
    <li th:if="${loggedInUser == null}" class="nav-item"><a class="nav-link" th:href="@{/login}">Login</a></li>
    <li th:if="${loggedInUser != null}" class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
    <li th:if="${loggedInUser != null}" class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
</ul> 
            <span th:if="${loggedInUser != null}" class="navbar-text ms-3">Welcome, <span th:text="${loggedInUser}"></span></span>
        </div>
    </div>
</nav>

<div th:if="${successMessage}" class="alert alert-success alert-flash">
    <span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div th:if="${errorMessage}" class="alert alert-danger alert-flash">
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<main>
    <div layout:fragment="content">
        <div class="container mt-4">Content goes here</div>
    </div>
</main>

<footer>
    <div class="container text-center">
        <p>&copy; <span th:text="${currentYear}"></span> NexusStore. All rights reserved.</p>
    </div>
</footer>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
