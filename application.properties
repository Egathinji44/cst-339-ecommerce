# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/nexusstore?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JDBC Configuration
spring.jdbc.template.query-timeout=30

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.nexusstore=DEBUG

# Server Configuration
server.port=8080
server.error.whitelabel.enabled=false

# Security
spring.security.user.name=admin
spring.security.user.password=admin123

# Auto-create tables from schema.sql
spring.sql.init.mode=always
spring.sql.init.platform=mysql
spring.jpa.defer-datasource-initialization=true

# Allow circular references (temporary fix)
spring.main.allow-circular-references=true