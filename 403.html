<!-- src/main/resources/templates/error/403.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Access Denied - NexusStore</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card shadow-lg mt-5">
                <div class="card-body p-5">
                    <!-- 403 Icon -->
                    <div class="mb-4">
                        <i class="fas fa-lock text-danger" style="font-size: 80px;"></i>
                    </div>
                    
                    <!-- Error Code -->
                    <h1 class="display-1 fw-bold text-danger">403</h1>
                    
                    <!-- Error Title -->
                    <h2 class="mb-3">Access Denied</h2>
                    
                    <!-- Error Message -->
                    <p class="lead mb-4">
                        Sorry, you don't have permission to access this page.
                    </p>
                    
                    <!-- Action Buttons -->
                    <div class="mt-4">
                        <a th:href="@{/}" class="btn btn-primary btn-lg me-2">
                            <i class="fas fa-home"></i> Home
                        </a>
                        <a th:href="@{/login}" class="btn btn-warning btn-lg" sec:authorize="isAnonymous()">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </a>
                        <a th:href="@{/products}" class="btn btn-info btn-lg" sec:authorize="isAuthenticated()">
                            <i class="fas fa-store"></i> Products
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
