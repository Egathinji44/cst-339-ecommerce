<!-- src/main/resources/templates/products/details.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${product.name} + ' - NexusStore'"></title>
</head>
<body>
<div layout:fragment="content">
    <div class="row">
        <div class="col-md-12 mb-3">
            <a th:href="@{/products}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Products
            </a>
        </div>
    </div>
    
    <div class="card shadow">
        <div class="card-header bg-info text-white">
            <h4 class="mb-0"><i class="fas fa-info-circle"></i> Product Details</h4>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-8">
                    <h2 th:text="${product.name}"></h2>
                    <p class="text-muted">SKU: <span th:text="${product.sku}"></span></p>
                    <hr>
                    <h5>Description</h5>
                    <p th:text="${product.description != null ? product.description : 'No description provided.'}"></p>
                    
                    <div class="row mt-4">
                        <div class="col-md-4">
                            <strong>Category:</strong>
                            <p><span class="badge bg-secondary" th:text="${product.category}"></span></p>
                        </div>
                        <div class="col-md-4">
                            <strong>Price:</strong>
                            <p class="text-success h4">$ <span th:text="${#numbers.formatDecimal(product.price, 1, 2)}"></span></p>
                        </div>
                        <div class="col-md-4">
                            <strong>Stock Quantity:</strong>
                            <p th:class="${product.quantity < 10} ? 'text-danger' : 'text-success'">
                                <span th:text="${product.quantity}"></span> units
                            </p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div th:if="${product.imageUrl}" class="text-center">
                        <img th:src="${product.imageUrl}" alt="Product Image" class="img-fluid rounded">
                    </div>
                    <div th:unless="${product.imageUrl}" class="text-center bg-light p-5 rounded">
                        <i class="fas fa-image fa-5x text-muted"></i>
                        <p class="mt-2">No image available</p>
                    </div>
                </div>
            </div>
            
            <hr>
            
            <div class="d-flex justify-content-between">
                <a th:href="@{/products}" class="btn btn-secondary">
                    <i class="fas fa-list"></i> Back to List
                </a>
                <div>
                    <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-warning">
                        <i class="fas fa-edit"></i> Edit Product
                    </a>
                    <form th:action="@{/products/{id}/delete(id=${product.id})}" 
                          method="post" style="display: inline;">
                        <button type="submit" class="btn btn-danger" 
                                onclick="return confirm('Are you sure you want to delete this product?')">
                            <i class="fas fa-trash"></i> Delete Product
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
