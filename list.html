<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Product Management - NexusStore</title>
</head>
<body>
<div layout:fragment="content">
    <!-- Hero Section -->
    <div class="hero-section">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h1><i class="fas fa-boxes"></i> Product Management</h1>
                <p>Manage your inventory, track stock levels, and keep your store running smoothly.</p>
            </div>
            <div class="col-md-4 text-end">
                <a th:href="@{/products/create}" class="btn-gradient btn-lg">
                    <i class="fas fa-plus-circle"></i> Add New Product
                </a>
            </div>
        </div>
    </div>

    <!-- Search Section -->
    <div class="card-premium mb-4">
        <div class="card-body">
            <form th:action="@{/products}" method="get" class="row g-3">
                <div class="col-md-10">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-0">
                            <i class="fas fa-search text-muted"></i>
                        </span>
                        <input type="text" name="search" class="form-control form-control-premium" 
                               placeholder="Search products by name, SKU, or category..." 
                               th:value="${searchTerm}">
                    </div>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn-gradient w-100">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Products Table -->
    <div th:if="${!products.empty}">
        <div class="card-premium">
            <div class="table-responsive">
                <table class="table table-premium mb-0">
                    <thead>
                        <tr>
                            <th><i class="fas fa-hashtag"></i> ID</th>
                            <th><i class="fas fa-barcode"></i> SKU</th>
                            <th><i class="fas fa-tag"></i> Name</th>
                            <th><i class="fas fa-folder"></i> Category</th>
                            <th><i class="fas fa-dollar-sign"></i> Price</th>
                            <th><i class="fas fa-box"></i> Stock</th>
                            <th><i class="fas fa-cogs"></i> Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td th:text="${product.id}">学</td>
                            <td><code th:text="${product.sku}"></code></td>
                            <td><strong th:text="${product.name}"></strong></td>
                            <td><span class="badge-category" th:text="${product.category}"></span></td>
                            <td class="text-primary fw-bold">$ <span th:text="${#numbers.formatDecimal(product.price, 1, 2)}"></span></td>
                            <td>
                                <span th:class="${product.quantity < 10} ? 'badge-stock badge-stock-low' : 'badge-stock badge-stock-high'">
                                    <i th:class="${product.quantity < 10} ? 'fas fa-exclamation-triangle' : 'fas fa-check-circle'"></i>
                                    <span th:text="${product.quantity}"></span> units
                                </span>
                            </td>
                            <td>
                                <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-sm btn-info action-btn" title="View">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-sm btn-warning action-btn" title="Edit">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" style="display: inline;">
                                    <button type="submit" class="btn btn-sm btn-danger action-btn" onclick="return confirm('Are you sure you want to delete this product?')" title="Delete">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Stats Section -->
        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card-premium text-center">
                    <div class="card-body">
                        <i class="fas fa-boxes fa-2x text-primary mb-2"></i>
                        <h3 th:text="${products.size()}"></h3>
                        <p class="text-muted">Total Products</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-premium text-center">
                    <div class="card-body">
                        <i class="fas fa-tags fa-2x text-success mb-2"></i>
                        <h3 th:text="${#lists.size(products.?[category == 'Electronics'])}"></h3>
                        <p class="text-muted">Electronics</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-premium text-center">
                    <div class="card-body">
                        <i class="fas fa-tshirt fa-2x text-info mb-2"></i>
                        <h3 th:text="${#lists.size(products.?[category == 'Clothing'])}"></h3>
                        <p class="text-muted">Clothing</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
    <div th:if="${products.empty}" class="empty-state">
        <i class="fas fa-box-open"></i>
        <h3>No Products Found</h3>
        <p class="text-muted">Get started by adding your first product to the store.</p>
        <a th:href="@{/products/create}" class="btn-gradient mt-3">
            <i class="fas fa-plus-circle"></i> Add New Product
        </a>
    </div>
</div>
</body>
</html>
