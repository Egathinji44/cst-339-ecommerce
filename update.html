<!-- src/main/resources/templates/products/update.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Edit Product - NexusStore</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-warning">
                    <h4 class="mb-0"><i class="fas fa-edit"></i> Edit Product</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/products/{id}/edit(id=${productId})}" 
                          th:object="${product}" method="post">
                        
                        <div class="mb-3">
                            <label for="sku" class="form-label">SKU *</label>
                            <input type="text" class="form-control" id="sku" th:field="*{sku}">
                            <div th:if="${#fields.hasErrors('sku')}" 
                                 th:errors="*{sku}" class="text-danger small"></div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="name" class="form-label">Product Name *</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}">
                            <div th:if="${#fields.hasErrors('name')}" 
                                 th:errors="*{name}" class="text-danger small"></div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="category" class="form-label">Category *</label>
                            <select class="form-select" id="category" th:field="*{category}">
                                <option value="Electronics">Electronics</option>
                                <option value="Clothing">Clothing</option>
                                <option value="Books">Books</option>
                                <option value="Home & Garden">Home & Garden</option>
                                <option value="Sports">Sports</option>
                                <option value="Toys">Toys</option>
                            </select>
                            <div th:if="${#fields.hasErrors('category')}" 
                                 th:errors="*{category}" class="text-danger small"></div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="price" class="form-label">Price *</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" step="0.01" class="form-control" id="price" th:field="*{price}">
                                </div>
                                <div th:if="${#fields.hasErrors('price')}" 
                                     th:errors="*{price}" class="text-danger small"></div>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="quantity" class="form-label">Quantity *</label>
                                <input type="number" class="form-control" id="quantity" th:field="*{quantity}">
                                <div th:if="${#fields.hasErrors('quantity')}" 
                                     th:errors="*{quantity}" class="text-danger small"></div>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" rows="4" th:field="*{description}"></textarea>
                            <div th:if="${#fields.hasErrors('description')}" 
                                 th:errors="*{description}" class="text-danger small"></div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="imageUrl" class="form-label">Image URL</label>
                            <input type="text" class="form-control" id="imageUrl" th:field="*{imageUrl}">
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/products}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Update Product
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
