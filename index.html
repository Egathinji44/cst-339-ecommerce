<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Home</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container mt-4">
        <div class="text-center my-5">
            <h1>Welcome to NexusStore</h1>
            <p class="lead">Your one-stop shop for amazing products!</p>
            <p th:text="${currentDate}"></p>
            <div th:if="${loggedInUser == null}">
                <a th:href="@{/register}" class="btn btn-primary btn-lg">Get Started</a>
                <a th:href="@{/login}" class="btn btn-outline-secondary btn-lg">Login</a>
            </div>
            <div th:if="${loggedInUser != null}">
                <a th:href="@{/dashboard}" class="btn btn-primary btn-lg">Go to Dashboard</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
