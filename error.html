<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Error - NexusStore</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card">
                <div class="card-body p-5">
                    <i class="fas fa-exclamation-triangle text-warning" style="font-size: 80px;"></i>
                    <h1 class="display-1 fw-bold text-danger" th:text="${statusCode}">500</h1>
                    <h3 th:text="${error}">Error Occurred</h3>
                    <p class="lead" th:text="${message}">Something went wrong</p>
                    <a th:href="@{/}" class="btn btn-primary btn-lg">
                        <i class="fas fa-home"></i> Go Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
